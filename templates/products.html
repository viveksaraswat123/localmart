<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Products | LocalMart</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #111;
      --ink2: #444;
      --ink3: #888;
      --line: #e5e5e5;
      --bg: #fafaf8;
      --paper: #fff;
      --accent: #c8622a;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Geist', sans-serif;
      font-weight: 400;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex; flex-direction: column;
    }

    /* ─── NAV ─── */
    nav {
      position: fixed; inset: 0 0 auto 0; z-index: 99;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 5vw; height: 58px;
      background: rgba(250,250,248,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--line);
    }
    .logo {
      font-family: 'Instrument Serif', serif;
      font-size: 1.25rem; color: var(--ink);
      text-decoration: none; letter-spacing: -0.01em;
    }
    .logo b { color: var(--accent); font-weight: 400; }
    .nav-links { display: flex; align-items: center; gap: 28px; list-style: none; }
    .nav-links a {
      font-size: 0.82rem; color: var(--ink2);
      text-decoration: none; letter-spacing: 0.02em;
      transition: color 0.15s;
    }
    .nav-links a:hover, .nav-links a.active { color: var(--ink); }
    .nav-links a.active { border-bottom: 1px solid var(--ink); padding-bottom: 1px; }
    .nav-login {
      font-size: 0.82rem !important; color: var(--ink) !important;
      border: 1px solid var(--ink); padding: 6px 18px; border-radius: 100px;
      transition: background 0.15s, color 0.15s !important;
    }
    .nav-login:hover { background: var(--ink) !important; color: var(--bg) !important; }
    .burger { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 4px; background: none; border: none; }
    .burger span { width: 22px; height: 1.5px; background: var(--ink); display: block; }
    .mobile-menu {
      display: none; position: fixed; inset: 58px 0 0 0; z-index: 98;
      background: var(--bg); padding: 32px 5vw;
      border-top: 1px solid var(--line); flex-direction: column; gap: 0;
    }
    .mobile-menu.open { display: flex; }
    .mobile-menu a {
      font-size: 1.05rem; color: var(--ink); text-decoration: none;
      padding: 18px 0; border-bottom: 1px solid var(--line);
    }

    /* ─── PAGE HEADER ─── */
    .page-header {
      padding: calc(58px + 56px) 5vw 0;
      border-bottom: 1px solid var(--line);
      background: var(--paper);
    }
    .page-header-inner {
      display: flex; align-items: flex-end; justify-content: space-between;
      flex-wrap: wrap; gap: 24px;
      padding-bottom: 28px;
    }
    .page-tag {
      font-size: 0.72rem; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--ink3); margin-bottom: 10px;
    }
    .page-header h1 {
      font-family: 'Instrument Serif', serif;
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 400; letter-spacing: -0.02em; line-height: 1.1;
    }
    .product-count { font-size: 0.82rem; color: var(--ink3); align-self: flex-end; padding-bottom: 4px; }

    /* ─── FILTER BAR ─── */
    .filter-bar {
      background: var(--paper);
      border-bottom: 1px solid var(--line);
      padding: 14px 5vw;
      display: flex; align-items: center; gap: 12px;
      flex-wrap: wrap;
      position: sticky; top: 58px; z-index: 10;
    }
    .search-wrap {
      position: relative; flex: 1; min-width: 200px; max-width: 360px;
    }
    .search-icon {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      color: var(--ink3); font-size: 0.85rem; pointer-events: none;
    }
    #searchBar {
      width: 100%; padding: 10px 14px 10px 36px;
      background: var(--bg); border: 1px solid var(--line);
      border-radius: 8px; font-family: 'Geist', sans-serif;
      font-size: 0.85rem; color: var(--ink); outline: none;
      transition: border-color 0.2s;
    }
    #searchBar:focus { border-color: var(--ink); }
    #searchBar::placeholder { color: var(--ink3); }

    .filter-chips { display: flex; gap: 8px; flex-wrap: wrap; }
    .chip {
      font-size: 0.78rem; padding: 7px 16px; border-radius: 100px;
      border: 1px solid var(--line); background: transparent;
      color: var(--ink2); cursor: pointer; font-family: 'Geist', sans-serif;
      transition: all 0.15s; white-space: nowrap;
    }
    .chip:hover { border-color: var(--ink); color: var(--ink); }
    .chip.active { background: var(--ink); color: var(--bg); border-color: var(--ink); }

    .sort-select {
      margin-left: auto; font-size: 0.78rem; color: var(--ink2);
      background: transparent; border: 1px solid var(--line);
      border-radius: 8px; padding: 7px 12px;
      font-family: 'Geist', sans-serif; cursor: pointer; outline: none;
    }

    /* ─── MAIN LAYOUT ─── */
    main { flex: 1; padding: 36px 5vw 72px; }

    /* ─── PRODUCT GRID ─── */
    #productGrid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0;
      border: 1px solid var(--line);
      background: var(--line);
    }

    /* ─── PRODUCT CARD ─── */
    .product-card {
      background: var(--paper);
      display: flex; flex-direction: column;
      text-decoration: none; color: inherit;
      transition: background 0.18s;
      position: relative;
      cursor: pointer;
    }
    .product-card:hover { background: var(--bg); }
    .product-card:hover .card-action { opacity: 1; transform: translateY(0); }

    .card-img {
      width: 100%; aspect-ratio: 1 / 1;
      object-fit: cover; display: block;
      background: var(--bg);
    }
    .card-img-placeholder {
      width: 100%; aspect-ratio: 1 / 1;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      font-size: 2.4rem; color: var(--line);
    }

    .card-body { padding: 18px 20px 20px; flex: 1; display: flex; flex-direction: column; }
    .card-cat {
      font-size: 0.68rem; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--ink3); margin-bottom: 6px;
    }
    .card-name {
      font-family: 'Instrument Serif', serif;
      font-size: 1.05rem; font-weight: 400; line-height: 1.3;
      margin-bottom: 6px; color: var(--ink);
    }
    .card-desc {
      font-size: 0.78rem; color: var(--ink3); line-height: 1.55;
      font-weight: 300; flex: 1; margin-bottom: 16px;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
    }
    .card-footer { display: flex; align-items: center; justify-content: space-between; }
    .card-price {
      font-size: 1rem; font-weight: 500; color: var(--ink);
    }
    .card-price span { font-size: 0.75rem; color: var(--ink3); font-weight: 300; }
    .card-badge {
      font-size: 0.68rem; letter-spacing: 0.06em; text-transform: uppercase;
      padding: 4px 10px; border-radius: 100px;
      background: var(--bg); border: 1px solid var(--line); color: var(--ink2);
    }
    .card-badge.new { background: #f0faf0; border-color: #c3e6c3; color: #2d7a2d; }
    .card-badge.used { background: #fff8f0; border-color: #f0d8b8; color: #8a5a20; }
    .card-badge.service { background: #f0f4ff; border-color: #c0cefd; color: #3355cc; }

    .card-action {
      position: absolute; bottom: 20px; right: 20px;
      opacity: 0; transform: translateY(6px);
      transition: opacity 0.2s, transform 0.2s;
      background: var(--ink); color: var(--bg);
      font-size: 0.75rem; font-weight: 500;
      padding: 8px 16px; border-radius: 100px;
      border: none; cursor: pointer; font-family: 'Geist', sans-serif;
    }

    /* ─── EMPTY STATE ─── */
    .empty-state {
      grid-column: 1 / -1;
      background: var(--paper);
      padding: 80px 40px; text-align: center;
    }
    .empty-state p { font-size: 0.9rem; color: var(--ink3); margin-top: 10px; }
    .empty-state h3 {
      font-family: 'Instrument Serif', serif;
      font-size: 1.5rem; font-weight: 400; color: var(--ink2);
    }

    /* ─── FOOTER ─── */
    footer {
      border-top: 1px solid var(--line);
      padding: 24px 5vw;
      background: var(--paper);
      display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px;
      font-size: 0.78rem; color: var(--ink3);
    }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 1100px) {
      #productGrid { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 768px) {
      .nav-links { display: none; }
      .burger { display: flex; }
      #productGrid { grid-template-columns: repeat(2, 1fr); }
      .sort-select { margin-left: 0; }
    }
    @media (max-width: 480px) {
      #productGrid { grid-template-columns: 1fr; }
      .page-header-inner { flex-direction: column; align-items: flex-start; gap: 8px; }
      .filter-bar { gap: 10px; }
    }

    /* ─── REVEAL ─── */
    @keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:none; } }
    .product-card { animation: fadeIn 0.4s ease both; }
  </style>
</head>
<body>

<!-- NAV -->
<nav>
  <a class="logo" href="/">Local<b>Mart</b></a>
  <ul class="nav-links">
    <li><a href="/">Home</a></li>
    <li><a href="/products_page/" class="active">Products</a></li>
    <li><a href="/add-product">Add Product</a></li>
    <li><a href="/services">Services</a></li>
    <li><a href="/login" class="nav-login">Login</a></li>
  </ul>
  <button class="burger" onclick="toggleMenu()" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
</nav>

<div class="mobile-menu" id="mobileMenu">
  <a href="/">Home</a>
  <a href="/products_page/">Products</a>
  <a href="/add-product">Add Product</a>
  <a href="/services">Services</a>
  <a href="/login">Login →</a>
</div>

<!-- PAGE HEADER -->
<div class="page-header">
  <div class="page-header-inner">
    <div>
      <p class="page-tag">LocalMart</p>
      <h1>Explore products</h1>
    </div>
    <span class="product-count" id="productCount">— items</span>
  </div>
</div>

<!-- FILTER BAR -->
<div class="filter-bar">
  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input type="text" id="searchBar" placeholder="Search products…"/>
  </div>
  <div class="filter-chips">
    <button class="chip active" data-cat="all">All</button>
    <button class="chip" data-cat="grocery">Groceries</button>
    <button class="chip" data-cat="service">Services</button>
    <button class="chip" data-cat="used">Pre-owned</button>
  </div>
  <select class="sort-select" id="sortSelect">
    <option value="default">Sort: Default</option>
    <option value="price-asc">Price: Low → High</option>
    <option value="price-desc">Price: High → Low</option>
    <option value="name">Name: A–Z</option>
  </select>
</div>

<!-- PRODUCTS -->
<main>
  <div id="productGrid">
    <!-- Cards injected by JS -->
  </div>
</main>

<!-- FOOTER -->
<footer>
  <span>© 2025 LocalMart. All Rights Reserved.</span>
  <span>Made for local communities</span>
</footer>

<script>
  /* ─── Mobile menu ─── */
  function toggleMenu() {
    document.getElementById('mobileMenu').classList.toggle('open');
  }
  document.querySelectorAll('#mobileMenu a').forEach(a =>
    a.addEventListener('click', () => document.getElementById('mobileMenu').classList.remove('open'))
  );

  /* ─── Sample data (replace with real fetch from your backend) ─── */
  const SAMPLE_PRODUCTS = [
    { id:1, name:'Fresh Tomatoes', category:'grocery', price:40, unit:'kg', desc:'Farm-fresh tomatoes from local growers, delivered daily.', badge:'new' },
    { id:2, name:'Whole Wheat Bread', category:'grocery', price:55, unit:'loaf', desc:'Freshly baked whole wheat loaf from the bakery next door.', badge:'' },
    { id:3, name:'Electrician — Home Visit', category:'service', price:299, unit:'visit', desc:'Certified electrician for repairs, installations and inspections.', badge:'service' },
    { id:4, name:'Study Table', category:'used', price:1800, unit:'', desc:'Solid wood study table in good condition. Minor scratches on top.', badge:'used' },
    { id:5, name:'Basmati Rice', category:'grocery', price:120, unit:'kg', desc:'Premium long-grain basmati rice, sourced locally.', badge:'' },
    { id:6, name:'Plumber — Pipe Fix', category:'service', price:199, unit:'visit', desc:'Quick pipe repair and leak-fixing service at home.', badge:'service' },
    { id:7, name:'Ceiling Fan', category:'used', price:900, unit:'', desc:'Working ceiling fan, 3 speed. 2 years old. Minor dust marks.', badge:'used' },
    { id:8, name:'Organic Spinach', category:'grocery', price:30, unit:'bunch', desc:'Freshly harvested organic spinach. No pesticides used.', badge:'new' },
    { id:9, name:'Carpenter — Furniture Repair', category:'service', price:399, unit:'visit', desc:'Expert carpenter for furniture assembly, repair and polishing.', badge:'service' },
    { id:10, name:'Wooden Bookshelf', category:'used', price:2200, unit:'', desc:'5-shelf solid wood bookshelf in excellent condition.', badge:'used' },
    { id:11, name:'Milk (Full Fat)', category:'grocery', price:58, unit:'litre', desc:'Fresh full-fat cow milk from a nearby dairy farm.', badge:'' },
    { id:12, name:'Pressure Cooker', category:'used', price:650, unit:'', desc:'5-litre stainless steel pressure cooker, barely used.', badge:'used' },
  ];

  /* ─── Emoji placeholders per category ─── */
  const EMOJIS = { grocery:'🥦', service:'🔧', used:'📦' };

  /* ─── State ─── */
  let activeCategory = 'all';
  let searchQuery = '';
  let sortOrder = 'default';

  /* ─── Render ─── */
  function renderProducts() {
    const grid = document.getElementById('productGrid');
    let products = [...SAMPLE_PRODUCTS];

    if (activeCategory !== 'all') products = products.filter(p => p.category === activeCategory);
    if (searchQuery) products = products.filter(p =>
      p.name.toLowerCase().includes(searchQuery) || p.desc.toLowerCase().includes(searchQuery)
    );
    if (sortOrder === 'price-asc') products.sort((a,b) => a.price - b.price);
    else if (sortOrder === 'price-desc') products.sort((a,b) => b.price - a.price);
    else if (sortOrder === 'name') products.sort((a,b) => a.name.localeCompare(b.name));

    document.getElementById('productCount').textContent = `${products.length} item${products.length !== 1 ? 's' : ''}`;

    if (products.length === 0) {
      grid.innerHTML = `<div class="empty-state"><h3>No products found</h3><p>Try a different search or filter.</p></div>`;
      return;
    }

    grid.innerHTML = products.map((p, i) => `
      <div class="product-card" style="animation-delay:${i * 0.04}s" onclick="viewProduct(${p.id})">
        <div class="card-img-placeholder">${EMOJIS[p.category] || '📦'}</div>
        <div class="card-body">
          <span class="card-cat">${p.category}</span>
          <div class="card-name">${p.name}</div>
          <div class="card-desc">${p.desc}</div>
          <div class="card-footer">
            <div class="card-price">₹${p.price.toLocaleString('en-IN')} <span>${p.unit ? '/ ' + p.unit : ''}</span></div>
            ${p.badge ? `<span class="card-badge ${p.badge}">${p.badge === 'new' ? 'New' : p.badge === 'used' ? 'Used' : 'Service'}</span>` : ''}
          </div>
        </div>
        <button class="card-action">View →</button>
      </div>
    `).join('');
  }

  /* ─── View product (hook into your routing) ─── */
  function viewProduct(id) {
    window.location.href = `/product/${id}`;
  }

  /* ─── Filter chips ─── */
  document.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', () => {
      document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      activeCategory = chip.dataset.cat;
      renderProducts();
    });
  });

  /* ─── Search ─── */
  document.getElementById('searchBar').addEventListener('input', e => {
    searchQuery = e.target.value.toLowerCase().trim();
    renderProducts();
  });

  /* ─── Sort ─── */
  document.getElementById('sortSelect').addEventListener('change', e => {
    sortOrder = e.target.value;
    renderProducts();
  });

  /* ─── Init ─── */
  renderProducts();
</script>
</body>
</html>
